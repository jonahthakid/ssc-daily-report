name: Keepalive

on:
  schedule:
    # Twice a month at 00:00 UTC — well under the 60-day cutoff
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Touch keepalive file and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git add .keepalive
          git diff --cached --quiet && exit 0
          git commit -m "chore: keepalive [skip ci]"
          git push
