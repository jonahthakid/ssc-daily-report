name: Keepalive

on:
  schedule:
    - cron: "23 4 * * 1"   # Mondays 04:23 UTC (odd minute dodges the top-of-hour load drops)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 45
